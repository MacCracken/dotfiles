"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](fg:lilac)\
$username\
[оӮ°](fg:lilac bg:silver)\
$os\
$hostname\
[оӮ°](fg:silver bg:gold)\
$directory\
[оӮ°](fg:gold bg:emerald)\
$git_branch\
$git_status\
[оӮ°](fg:emerald bg:baby_blue)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:baby_blue bg:turquoise)\
$docker_context\
[оӮ°](fg:turquoise bg:#228B22)\
${custom.cyrius_pkg}\
[оӮ°](fg:#228B22 bg:#87CEEB)\
${custom.cyrius}\
[оӮ°](fg:#87CEEB bg:amethyst)\
$time\
[оӮҙ ](fg:amethyst)\
$line_break$character"""

palette = 'royal'

# Royal palette вҖ” sourced from eggradients.com/shades/royal-colors
[palettes.royal]
purple     = "#7851A9"  # Royal Purple
lilac      = "#C8A2C8"  # Royal Lilac
silver     = "#C0C0C0"  # Royal Silver
gold       = "#FADA5E"  # Royal Gold
emerald    = "#50C878"  # Royal Emerald
baby_blue  = "#89CFF0"  # Royal Baby Blue
turquoise  = "#40E0D0"  # Royal Turquoise
amethyst   = "#9966CC"  # Royal Amethyst
sapphire   = "#0F52BA"  # Royal Sapphire
indigo     = "#4B0082"  # Royal Indigo
navy       = "#000080"  # Royal Navy
forest     = "#228B22"  # Royal Forest Green (also bg of cyrius_pkg)
sky        = "#87CEEB"  # Royal Sky Blue (also bg of cyrius)
charcoal   = "#36454F"  # Royal Charcoal вҖ” dark text
ivory      = "#FFFFF0"  # Royal Ivory вҖ” light text
ruby       = "#DC143C"  # Royal Ruby вҖ” error
rose_gold  = "#B76E79"  # Royal Rose Gold
lavender   = "#E6E6FA"  # Royal Lavender
# Aliases so the untouched cyrius blocks resolve (they reference fg:text / fg:base):
text       = "#cdd6f4"  # light text вҖ” for fg:text on cyrius_pkg's dark green
base       = "#1e1e2e"  # dark text  вҖ” for fg:base on cyrius' sky blue

# Catppuccin Mocha вҖ” retained as fallback reference, not active.
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
orange    = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:silver fg:charcoal"
format = "[ $symbol]($style)"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = ""
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = ""
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = ""
Amazon = ""
Android = ""
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = ""
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[username]
show_always = true
style_user = "bg:lilac fg:charcoal"
style_root = "bg:lilac fg:charcoal"
format = '[ о·… $user ]($style)'

[hostname]
ssh_only = false
disabled = false
style = "bg:silver fg:charcoal"
format = '[ $hostname ]($style)'

[directory]
style = "fg:charcoal bg:gold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = " "
"Music" = "у°қҡ "
"Pictures" = " "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "оңҘ"
style = "bg:emerald"
format = '[[ $symbol $branch ](fg:charcoal bg:emerald)]($style)'

[git_status]
style = "bg:emerald"
format = '[[($all_status$ahead_behind )](fg:charcoal bg:emerald)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[c]
symbol = "оҳһ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[golang]
symbol = "оҳҰ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[php]
symbol = "оңҪ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[java]
symbol = "оү–"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[haskell]
symbol = "оқ·"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[python]
symbol = "оҲө"
style = "bg:baby_blue"
format = '[[ $symbol( $version) ](fg:charcoal bg:baby_blue)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:turquoise"
format = '[[ $symbol( $context) ](fg:charcoal bg:turquoise)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:amethyst"
format = '[[  $time ](fg:ivory bg:amethyst)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:emerald)'
error_symbol = '[вқҜ](bold fg:ruby)'
vimcmd_symbol = '[вқҜ](bold fg:emerald)'
vimcmd_replace_one_symbol = '[вқҜ](bold fg:amethyst)'
vimcmd_replace_symbol = '[вқҜ](bold fg:amethyst)'
vimcmd_visual_symbol = '[вқҜ](bold fg:lilac)'

# в”Җв”Җв”Җ Cyrius prompt segments в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Installed by `cyriusly cmdtools install starship`. Both blocks
# are referenced from the `format` string above (after the
# powerline-close arrow, before $line_break) so they actually
# render. Do not hand-edit the next two blocks; refresh with the
# install command.
#
# Caveat: `cyriusly cmdtools install starship` may rewrite this
# whole file with ONLY the Cyrius blocks (obliterating the
# powerline config). If a future reinstall flattens the file,
# `hapi rollback` walks back to the pre-flatten state, or
# restore from git. Worth filing as a cyrius-tooling concern.

[custom.cyrius_pkg]
command = "cyrius-prompt-info pkg"
when = "test -f cyrius.cyml"
symbol = "аҘҗ"
style = "fg:text bg:#228B22"
format = '[ $symbol $output ]($style)'
detect_files = ["cyrius.cyml"]

[custom.cyrius]
command = "cyrius-prompt-info tool"
when = "test -f cyrius.cyml || test -f cyrius.toml"
symbol = "рҹҢҖ"
style = "fg:base bg:#87CEEB"
format = '[ $symbol $output ]($style)'
detect_files = ["cyrius.cyml", "cyrius.toml"]
